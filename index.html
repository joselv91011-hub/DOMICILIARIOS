<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Panel de Domiciliarios</title>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #4cc9f0;
            --danger: #f72585;
            --warning: #f8961e;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #2b2d42;
            --text-muted: #8d99ae;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
            color: var(--primary);
            font-size: 2.5rem;
            letter-spacing: -1px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .top {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            padding: 14px 20px;
            border-radius: 12px;
            border: 2px solid #edf2f4;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
            font-size: 1rem;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1);
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:active {
            transform: scale(0.95);
        }

        .agregar {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3);
        }

        .agregar:hover {
            background: var(--secondary);
            box-shadow: 0 6px 20px rgba(67, 97, 238, 0.4);
        }

        .asignar {
            background: var(--success);
            color: white;
            box-shadow: 0 4px 15px rgba(76, 201, 240, 0.3);
        }

        .asignar:hover {
            background: #4895ef;
            box-shadow: 0 6px 20px rgba(76, 201, 240, 0.4);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat {
            background: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f3f5;
        }

        .stat span {
            display: block;
            font-size: 1.5rem;
            color: var(--primary);
            margin-top: 5px;
            font-weight: 600;
        }

        .lista {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: white;
            border-radius: 16px;
            transition: all 0.2s ease;
            border: 1px solid #f1f3f5;
        }

        .item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
            border-color: var(--primary);
        }

        .dom-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        .posicion {
            background: #f1f3f5;
            color: var(--text-muted);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .nombre {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .estado {
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 80px;
            text-align: center;
        }

        .activo {
            background: rgba(76, 201, 240, 0.1);
            color: #0077b6;
        }

        .ruta {
            background: rgba(248, 150, 30, 0.1);
            color: #d87d0a;
        }

        .acciones {
            display: flex;
            gap: 8px;
            margin: 0 15px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            padding: 0;
            border-radius: 10px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid transparent;
        }

        .btnEstado {
            background: #fff;
            color: var(--warning);
            border-color: var(--warning);
        }

        .btnEstado:hover {
            background: var(--warning);
            color: white;
        }

        .btnEliminar {
            background: #fff;
            color: var(--danger);
            border-color: var(--danger);
        }

        .btnEliminar:hover {
            background: var(--danger);
            color: white;
        }

        @media (max-width: 600px) {
            body {
                padding: 15px 10px;
            }

            h1 {
                font-size: 1.8rem;
                margin-bottom: 20px;
            }

            .container {
                padding: 15px;
                border-radius: 16px;
            }

            .top {
                flex-direction: column;
                gap: 12px;
            }

            input {
                width: 100%;
                box-sizing: border-box;
                padding: 12px 15px;
            }

            .top button {
                width: 100%;
                padding: 12px;
            }

            .stats {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
                margin-bottom: 20px;
            }

            .stat {
                padding: 12px 5px;
                border-radius: 12px;
            }

            .stat span {
                font-size: 1.1rem;
            }

            .item {
                display: grid;
                grid-template-areas:
                    "info actions"
                    "status status";
                grid-template-columns: 1fr auto;
                gap: 12px;
                padding: 14px;
            }

            .dom-info {
                grid-area: info;
                justify-content: flex-start;
                gap: 10px;
                overflow: hidden;
            }

            .nombre {
                font-size: 1rem;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .acciones {
                grid-area: actions;
                margin: 0;
                gap: 6px;
            }

            .btn-icon {
                width: 32px;
                height: 32px;
                font-size: 12px;
            }

            .estado {
                grid-area: status;
                width: 100%;
                box-sizing: border-box;
                margin: 0;
                padding: 8px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Panel de Domiciliarios</h1>

        <div class="top">

            <input type="text" id="nombre" placeholder="Nombre del domiciliario">

            <button class="agregar" onclick="agregar()">
                <i class="fas fa-plus"></i> Agregar
            </button>

            <button class="asignar" onclick="asignarPedido()">
                <i class="fas fa-shipping-fast"></i> Asignar Pedido
            </button>

        </div>

        <div class="stats">

            <div class="stat">Activos: <span id="activos">0</span></div>

            <div class="stat">En Ruta: <span id="ruta">0</span></div>

            <div class="stat">Total: <span id="total">0</span></div>

        </div>

        <div class="lista" id="lista"></div>

    </div>

    <script>

        let domiciliarios = JSON.parse(localStorage.getItem("domiciliarios")) || [];

        function guardar() {
            localStorage.setItem("domiciliarios", JSON.stringify(domiciliarios));
        }

        function agregar() {

            let nombre = document.getElementById("nombre").value.trim();

            if (nombre === "") return;

            domiciliarios.push({
                nombre: nombre,
                estado: "activo"
            });

            document.getElementById("nombre").value = "";

            guardar();
            render();
        }

        function cambiarEstado(i) {

            let d = domiciliarios[i];
            let nuevoEstado = d.estado === "activo" ? "ruta" : "activo";
            d.estado = nuevoEstado;

            // Al pasar a ruta, se mueve al final de la cola
            if (nuevoEstado === "ruta") {
                let [item] = domiciliarios.splice(i, 1);
                domiciliarios.push(item);
            }

            guardar();
            render();
        }

        function eliminar(i) {

            domiciliarios.splice(i, 1);

            guardar();
            render();
        }

        function asignarPedido() {

            let index = domiciliarios.findIndex(d => d.estado === "activo");

            if (index === -1) {
                alert("No hay domiciliarios activos");
                return;
            }

            domiciliarios[index].estado = "ruta";

            // Mover al final de la cola
            let [item] = domiciliarios.splice(index, 1);
            domiciliarios.push(item);

            guardar();
            render();
        }

        function render() {

            let lista = document.getElementById("lista");

            lista.innerHTML = "";

            let activos = 0;
            let ruta = 0;

            domiciliarios.forEach((d, i) => {

                if (d.estado === "activo") activos++;
                if (d.estado === "ruta") ruta++;

                let clase = d.estado === "activo" ? "activo" : "ruta";
                let texto = d.estado === "activo" ? "ACTIVO" : "EN RUTA";
                let iconEstado = d.estado === "activo" ? "fa-motorcycle" : "fa-home";

                lista.innerHTML += `
<div class="item">
    <div class="dom-info">
        <span class="posicion">#${i + 1}</span>
        <span class="nombre">${d.nombre}</span>
    </div>
    <div class="acciones">
        <button class="btn-icon btnEstado" onclick="cambiarEstado(${i})" title="Cambiar Estado">
            <i class="fas ${d.estado === 'activo' ? 'fa-route' : 'fa-check'}"></i>
        </button>
        <button class="btn-icon btnEliminar" onclick="eliminar(${i})" title="Eliminar">
            <i class="fas fa-trash-alt"></i>
        </button>
    </div>
    <span class="estado ${clase}">${texto}</span>
</div>
`;

            });

            document.getElementById("activos").innerText = activos;
            document.getElementById("ruta").innerText = ruta;
            document.getElementById("total").innerText = domiciliarios.length;

        }

        render();

    </script>

</body>

</html>
